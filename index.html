<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECRET LAND | REGISTRATION</title>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --red: #ff0000;
            --black: #050505;
            --white: #ffffff;
            --gray: #1a1a1a;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Courier Prime', monospace;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Borderland Design */
        #game-box {
            width: 90%;
            max-width: 450px;
            border: 3px solid var(--red);
            padding: 30px;
            text-align: center;
            background: linear-gradient(145deg, #0a0a0a, #111);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            position: relative;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--red);
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 2px 2px #000;
        }

        .screen {
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .active {
            display: block;
            opacity: 1;
        }

        #video-feed {
            width: 100%;
            background: #000;
            border: 1px solid var(--red);
            transform: scaleX(-1); /* Mirror view */
        }

        #captured-image {
            width: 100%;
            border: 1px solid var(--white);
            display: none;
        }

        .id-card {
            background: var(--white);
            color: var(--black);
            padding: 20px;
            margin: 20px 0;
            font-weight: bold;
        }

        .player-id {
            font-size: 3.5rem;
            color: var(--red);
            display: block;
        }

        button {
            background: var(--red);
            color: var(--white);
            border: none;
            padding: 15px 30px;
            font-family: 'Courier Prime', monospace;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            background: var(--white);
            color: var(--red);
            box-shadow: 0 0 15px var(--white);
        }

        button:disabled {
            background: #333;
            cursor: not-allowed;
        }

        canvas { display: none; }
    </style>
</head>
<body>

    <div id="game-box">
        <div id="step-1" class="screen active">
            <h1>IDENTIFICATION</h1>
            <video id="video-feed" autoplay playsinline></video>
            <button onclick="captureImage()">CAPTURE FACE</button>
        </div>

        <div id="step-2" class="screen">
            <h1>CONFIRM IDENTITY</h1>
            <img id="captured-image" src="">
            <button id="send-btn" onclick="sendData()">UPLOAD TO LAND</button>
        </div>

        <div id="step-3" class="screen">
            <h1>REGISTRATION COMPLETE</h1>
            <div class="id-card">
                PLAYER NUMBER
                <span id="player-num-display" class="player-id">--</span>
            </div>
            <p style="font-size: 0.8rem;">DATA TRANSMITTED TO SYSTEM.</p>
            <button onclick="nextPlayer()">NEXT PLAYER</button>
        </div>
    </div>

    <audio id="snd-click" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>
    <audio id="snd-success" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>

    <canvas id="canvas"></canvas>

    <script>
        // Initialize EmailJS
        emailjs.init("A996XaJv7m7qD29bh");

        const video = document.getElementById('video-feed');
        const canvas = document.getElementById('canvas');
        const capturedImg = document.getElementById('captured-image');
        const sndClick = document.getElementById('snd-click');
        const sndSuccess = document.getElementById('snd-success');

        let playerCount = 0;
        let base64Image = "";

        // Start Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access required for identification.");
            }
        }

        function playSound(snd) {
            snd.currentTime = 0;
            snd.play();
        }

        function switchScreen(from, to) {
            document.getElementById(`step-${from}`).classList.remove('active');
            setTimeout(() => {
                document.getElementById(`step-${to}`).classList.add('active');
            }, 100);
        }

        function captureImage() {
            playSound(sndClick);
            // Low quality capture (Small Resolution)
            canvas.width = 300; 
            canvas.height = 225;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // 0.1 Quality = ~20KB
            base64Image = canvas.toDataURL('image/jpeg', 0.1); 
            capturedImg.src = base64Image;
            capturedImg.style.display = "block";
            
            switchScreen(1, 2);
        }

        function sendData() {
            if (playerCount >= 40) return alert("Game is full.");
            
            playSound(sndClick);
            const sendBtn = document.getElementById('send-btn');
            sendBtn.disabled = true;
            sendBtn.innerText = "TRANSMITTING...";

            // Generate Number 00-50
            const assignedNumber = Math.floor(Math.random() * 51).toString().padStart(2, '0');

            const params = {
                player_number: assignedNumber,
                player_image: base64Image,
                to_email: 'refuerzojay7@gmail.com'
            };

            emailjs.send('service_cogemsd', 'template_9ag720q', params)
                .then(() => {
                    playSound(sndSuccess);
                    document.getElementById('player-num-display').innerText = assignedNumber;
                    playerCount++;
                    switchScreen(2, 3);
                })
                .catch((err) => {
                    alert("System Error. Try again.");
                    sendBtn.disabled = false;
                    sendBtn.innerText = "UPLOAD TO LAND";
                });
        }

        function nextPlayer() {
            playSound(sndClick);
            if (playerCount < 40) {
                switchScreen(3, 1);
                document.getElementById('send-btn').disabled = false;
                document.getElementById('send-btn').innerText = "UPLOAD TO LAND";
            } else {
                alert("MAX PLAYERS REACHED.");
            }
        }

        startCamera();
    </script>
</body>
</html>
