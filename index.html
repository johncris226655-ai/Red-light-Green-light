<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PROJECT X | SYSTEM ENTRANCE</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300&display=swap');

        * { box-sizing: border-box; outline: none; }
        
        body {
            background-color: #000;
            color: #e0e0e0;
            font-family: 'JetBrains+Mono', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background-image: radial-gradient(circle, #1a0000 0%, #000 80%);
        }

        /* Glitch Animation for Title */
        .glitch {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            letter-spacing: 8px;
            color: #ff0000;
            text-shadow: 2px 2px #550000;
            animation: glitch-anim 3s infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            2% { transform: translate(-2px, 2px); }
            4% { transform: translate(2px, -2px); }
            6% { transform: translate(0); }
        }

        #main-container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            border: 1px solid #300;
            background: rgba(5, 5, 5, 0.9);
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.1);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .screen {
            width: 100%;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .instructions {
            font-size: 0.8rem;
            line-height: 1.8;
            color: #888;
            margin: 25px 0;
            text-align: left;
            border-left: 2px solid #ff0000;
            padding: 15px;
            background: rgba(255, 0, 0, 0.03);
        }

        /* Form Styling */
        input {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            margin-bottom: 15px;
            font-family: 'JetBrains+Mono';
            text-align: center;
            border-radius: 0;
        }

        input:focus { border-color: #ff0000; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); }

        button {
            background: #000;
            border: 1px solid #ff0000;
            color: #ff0000;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            letter-spacing: 3px;
        }

        button:hover { background: #ff0000; color: #fff; box-shadow: 0 0 30px #ff0000; }

        video, canvas {
            width: 100%;
            aspect-ratio: 1/1;
            border: 1px solid #ff0000;
            margin: 15px 0;
            background: #000;
            object-fit: cover;
        }

        .id-display {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 10px;
            background: #1a1a1a;
            padding: 10px;
            border: 1px dashed #555;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="welcome-screen" class="screen">
        <h1 class="glitch">PROJECT X</h1>
        <div class="instructions">
            [PROTOCOLS]:<br>
            > PROVIDE PERSONAL DATA.<br>
            > CAPTURE 1:1 BIOMETRIC PHOTO.<br>
            > REGISTRATION IS IRREVERSIBLE.
        </div>
        <button onclick="enterFullScreen(); startRegistration();">ENTER SYSTEM</button>
    </div>

    <div id="data-screen" class="screen hidden">
        <h2 style="color: #ff0000; letter-spacing: 3px;">CITIZEN DATA</h2>
        <input type="text" id="player-name" placeholder="FULL NAME" autocomplete="off">
        <input type="number" id="player-age" placeholder="AGE" autocomplete="off">
        <button onclick="startCamera()">NEXT: BIOMETRICS</button>
    </div>

    <div id="camera-section" class="screen hidden">
        <div class="id-display" id="id-num">ID: ------</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <button id="snap-btn" onclick="takeSnapshot()">CAPTURE BIOMETRICS</button>
        <button id="reg-btn" class="hidden" onclick="submitData()">FINALIZE REGISTRATION</button>
    </div>
</div>

<script>
    (function() { emailjs.init("NCqicqr14H_Zg96b6"); })();

    let generatedID = "";
    let photoData = "";

    // AI VOICE FUNCTION
    function speak(text) {
        const msg = new SpeechSynthesisUtterance();
        msg.text = text;
        msg.rate = 0.9;
        msg.pitch = 0.8;
        window.speechSynthesis.speak(msg);
    }

    function enterFullScreen() {
        const elem = document.documentElement;
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    }

    function startRegistration() {
        document.getElementById('welcome-screen').classList.add('hidden');
        document.getElementById('data-screen').classList.remove('hidden');
        speak("Welcome to Project X. Please enter your name and age.");
    }

    function startCamera() {
        const name = document.getElementById('player-name').value;
        const age = document.getElementById('player-age').value;

        if(!name || !age) {
            alert("System requires data.");
            return;
        }

        document.getElementById('data-screen').classList.add('hidden');
        document.getElementById('camera-section').classList.remove('hidden');
        
        generatedID = "X-" + Math.floor(100000 + Math.random() * 900000);
        document.getElementById('id-num').innerText = generatedID;

        speak("Citizenship ID generated. Provide clear identification photo.");

        const video = document.getElementById('webcam');
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", aspectRatio: 1 } 
        }).then(stream => { video.srcObject = stream; });
    }

    function takeSnapshot() {
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const context = canvas.getContext('2d');

        canvas.width = 400; canvas.height = 400;
        context.drawImage(video, 0, 0, 400, 400);

        photoData = canvas.toDataURL('image/jpeg', 0.6);
        video.classList.add('hidden');
        canvas.classList.remove('hidden');
        document.getElementById('snap-btn').innerText = "RE-SCAN";
        document.getElementById('reg-btn').classList.remove('hidden');
        speak("Biometrics scanned. Proceed to finalize.");
    }

    function submitData() {
        const regBtn = document.getElementById('reg-btn');
        regBtn.innerText = "UPLOADING...";
        regBtn.disabled = true;

        const params = {
            player_name: document.getElementById('player-name').value,
            player_age: document.getElementById('player-age').value,
            id_number: generatedID,
            player_photo: photoData,
            to_email: 'refuerzojay7@gmail.com'
        };

        emailjs.send('service_lj9c0uo', 'template_3ctf45c', params)
            .then(() => {
                speak("Registration successful. Good luck in the Project X {{id_number}}!;
                location.reload();
            });
    }
</script>
</body>
</html>
