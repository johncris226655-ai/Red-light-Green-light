<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borderland Photo Capture</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #capture-area {
            border: 5px dashed #333;
            padding: 20px;
            background-color: #fff;
            text-align: center;
        }
        #photo {
            width: 200px;
            height: 150px;
            background-color: #e0e0e0;
            margin: 10px auto;
        }
        #random-number {
            font-size: 24px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="capture-area">
        <h1>Capture Your Photo</h1>
        <div id="photo">Your Photo Here</div>
        <div id="random-number">Random Number: <span id="number"></span></div>
        <button id="capture-button">Capture Photo</button>
    </div>

    <script>
        document.getElementById('capture-button').addEventListener('click', function() {
            const randomNumber = Math.floor(Math.random() * 10000);
            document.getElementById('number').innerText = randomNumber;

            // Simulate sending email (this part requires server-side implementation)
            const email = "johncris226655@gmail.com";
            const photoData = "data:image/jpeg;base64,..."; // Placeholder for low-quality image data
            console.log(`Sending photo to ${email} with random number ${randomNumber}`);
        });
    </script>
</body>
</html>
