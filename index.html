<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IDENTITY PROTOCOL</title>

<link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    background:black;
    color:white;
    font-family:'Special Elite', monospace;
}

.screen {
    display:none;
    height:100vh;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.active { display:flex; }

h1 { color:red; letter-spacing:3px; }

button {
    background:black;
    border:2px solid red;
    color:white;
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}

video, canvas {
    width:300px;
    height:220px;
    border:2px solid white;
}
</style>
</head>

<body>

<!-- SCREEN 1 -->
<div id="s1" class="screen active">
    <h1>IDENTITY PROTOCOL</h1>
    <button onclick="next(2)">START SCAN</button>
</div>

<!-- CAMERA -->
<div id="s2" class="screen">
    <h1>FACE CAPTURE</h1>

    <video id="video" autoplay></video>
    <canvas id="canvas"></canvas>

    <button onclick="capture()">CAPTURE</button>
    <button onclick="download()">DOWNLOAD</button>
    <button onclick="next(3)">CONFIRM</button>
</div>

<!-- RESULT -->
<div id="s3" class="screen">
    <h1>ASSIGNING ID</h1>
    <h2 id="pid"></h2>

    <button onclick="send()">SEND TO SYSTEM</button>
</div>

<script src="https://cdn.emailjs.com/dist/email.min.js"></script>

<script>
let stream;
let imgData = "";
let playerId = "";

navigator.mediaDevices.getUserMedia({ video:true })
.then(s=>{
    stream = s;
    document.getElementById("video").srcObject = s;
});

function next(n){
    document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"));
    document.getElementById("s"+n).classList.add("active");

    if(n===3){
        playerId = String(Math.floor(Math.random()*51)).padStart(2,'0');
        document.getElementById("pid").innerText = "PLAYER ID: " + playerId;
    }
}

function capture(){
    let c = document.getElementById("canvas");
    let v = document.getElementById("video");

    let ctx = c.getContext("2d");

    // FORCE SMALL SIZE (important for low KB)
    c.width = 240;
    c.height = 180;

    ctx.drawImage(v,0,0,240,180);

    // VERY LOW QUALITY JPEG
    imgData = c.toDataURL("image/jpeg",0.25);
}

function download(){
    let a = document.createElement("a");
    a.href = imgData;
    a.download = "identity_low.jpg";
    a.click();
}

emailjs.init("A996XaJv7m7qD29bh");

function send(){
    emailjs.send("service_cogemsd","template_o1tuhqg",{
        player_id: playerId,
        message: "Border Identity Registered",
        image_base64: imgData
    })
    .then(()=>alert("SENT"))
    .catch(()=>alert("ERROR"));
}
</script>

</body>
</html>
