<!DOCTYPE html>
<html lang="fil">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PROJECT X</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'JetBrains+Mono', monospace;
            overflow: hidden;
        }

        #main-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px;
            background: radial-gradient(circle at center, #1a0000 0%, #000 100%);
            position: relative;
        }

        /* Screen Transitions */
        .screen {
            width: 100%; max-width: 380px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-out { opacity: 0; transform: scale(0.9); filter: blur(10px); pointer-events: none; position: absolute; }
        .fade-in { opacity: 1; transform: scale(1); filter: blur(0); }

        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 2rem;
            color: #ff0000; letter-spacing: 5px; margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }

        .instructions {
            font-size: 0.75rem; color: #888; text-align: left;
            border-left: 2px solid #ff0000; padding: 15px;
            background: rgba(255, 0, 0, 0.05); margin-bottom: 30px;
        }

        input {
            width: 100%; background: #0a0a0a; border: 1px solid #333;
            color: #fff; padding: 15px; margin-bottom: 15px;
            font-family: 'JetBrains+Mono'; font-size: 1rem;
            border-radius: 4px;
        }

        /* Button Animation */
        button {
            width: 100%; background: transparent; border: 1px solid #ff0000;
            color: #ff0000; padding: 18px; font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; cursor: pointer; letter-spacing: 2px;
            position: relative; transition: 0.2s;
            overflow: hidden;
        }

        button::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 5px; height: 5px; background: rgba(255,0,0,0.5);
            opacity: 0; border-radius: 100%; transform: scale(1, 1) translate(-50%);
            transform-origin: 50% 50%;
        }

        @keyframes ripple {
            0% { transform: scale(0, 0); opacity: 1; }
            20% { transform: scale(25, 25); opacity: 1; }
            100% { opacity: 0; transform: scale(40, 40); }
        }

        button:focus:not(:active)::after { animation: ripple 0.4s ease-out; }

        button:active { background: #ff0000; color: #fff; transform: translateY(2px); }

        video, canvas {
            width: 100%; max-width: 300px; aspect-ratio: 1/1;
            border: 1px solid #ff0000; margin-bottom: 20px;
            background: #050505; object-fit: cover;
        }

        .id-label { font-size: 1.4rem; font-weight: bold; margin-bottom: 15px; letter-spacing: 3px; }

        #success-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            display: none; animation: fadeIn 0.5s;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="main-container">
    <div id="welcome-screen" class="screen">
        <h1>PROJECT X</h1>
        <div class="instructions">
            PROTOCOL 01: BIOMETRIC AUTHENTICATION<br>
            STATUS: WAITING FOR INITIATION...
        </div>
        <button id="init-btn">INITIATE SYSTEM</button>
    </div>

    <div id="data-screen" class="screen hidden">
        <h1>DATA ENTRY</h1>
        <input type="text" id="p-name" placeholder="IDENTIFICATION NAME">
        <input type="number" id="p-age" placeholder="AGE">
        <button id="data-btn">GENERATE ID</button>
    </div>

    <div id="camera-screen" class="screen hidden">
        <div class="id-label" id="id-tag">ID: ------</div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="canvas" class="hidden"></canvas>
        <button id="snap-btn">CAPTURE</button>
        <button id="reg-btn" class="hidden">FINALIZE</button>
    </div>
</div>

<div id="success-overlay">
    <h1 style="font-size: 1.5rem;">REGISTRATION COMPLETE</h1>
    <p id="final-msg" style="color: #ff0000; font-size: 1.2rem;"></p>
</div>

<script>
    (function() { emailjs.init("NCqicqr14H_Zg96b6"); })();

    let pID = "";
    let photo = "";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function speak(text) {
        const utter = new SpeechSynthesisUtterance(text);
        utter.rate = 0.85; utter.pitch = 0.7;
        window.speechSynthesis.speak(utter);
    }

    // Screen Switcher with Animation
    function nextScreen(current, next, voiceText) {
        playSound(800, 0.05);
        const currElem = document.getElementById(current);
        const nextElem = document.getElementById(next);
        
        currElem.classList.add('fade-out');
        setTimeout(() => {
            currElem.classList.add('hidden');
            nextElem.classList.remove('hidden');
            nextElem.classList.add('fade-in');
            if(voiceText) speak(voiceText);
        }, 400);
    }

    // BUTTON HANDLERS
    document.getElementById('init-btn').onclick = function() {
        const doc = document.documentElement;
        if (doc.requestFullscreen) doc.requestFullscreen();
        nextScreen('welcome-screen', 'data-screen', "Welcome to Project X. Input your identification name and age to proceed.");
    };

    document.getElementById('data-btn').onclick = function() {
        const name = document.getElementById('p-name').value;
        if (!name) return;
        
        pID = "R-" + Math.floor(10000 + Math.random() * 90000);
        document.getElementById('id-tag').innerText = pID;
        
        nextScreen('data-screen', 'camera-screen', "Identification name recorded. Your ID is " + pID.split('').join(' ') + ". Capture your biometric photo.");
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", aspectRatio: 1 } })
            .then(stream => { document.getElementById('webcam').srcObject = stream; });
    };

    document.getElementById('snap-btn').onclick = function() {
        playSound(600, 0.05);
        const v = document.getElementById('webcam');
        const c = document.getElementById('canvas');
        c.width = 400; c.height = 400;
        c.getContext('2d').drawImage(v, 0, 0, 400, 400);
        photo = c.toDataURL('image/jpeg', 0.5);
        v.classList.add('hidden');
        c.classList.remove('hidden');
        this.innerText = "RE-SCAN";
        document.getElementById('reg-btn').classList.remove('hidden');
    };

    document.getElementById('reg-btn').onclick = function() {
        this.innerText = "UPLOADING...";
        this.disabled = true;
        playSound(1000, 0.2);

        const params = {
            player_name: document.getElementById('p-name').value,
            player_age: document.getElementById('p-age').value,
            id_number: pID,
            player_photo: photo,
            to_email: 'refuerzojay7@gmail.com'
        };

        emailjs.send('service_lj9c0uo', 'template_3ctf45c', params)
            .then(() => {
                document.getElementById('success-overlay').style.display = 'flex';
                document.getElementById('final-msg').innerText = "WELCOME TO PROJECT X, " + pID;
                speak("Registration Successful. Welcome to Project X, " + pID.split('').join(' '));
                setTimeout(() => { location.reload(); }, 5000);
            });
    };
</script>
</body>
</html>
